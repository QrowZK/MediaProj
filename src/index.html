<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; media-src 'self' auralis:; img-src 'self' auralis: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' auralis:;" />
  <title>Auralis</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">

    <!-- ══════════ Titlebar ══════════ -->
    <header id="titlebar">
      <div class="titlebar-brand">
        <svg class="brand-mark" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M12 2 L21 21 H17.5 L12 8.5 L6.5 21 H3 Z" fill="currentColor"/>
          <rect x="9.2" y="15.5" width="5.6" height="2.4" rx="1.2" fill="currentColor"/>
        </svg>
        <span class="brand-name">AURALIS</span>
      </div>
      <div class="titlebar-search">
        <svg viewBox="0 0 24 24" width="14" height="14"><circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/><line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="search-input" type="text" placeholder="Search your library…" spellcheck="false" />
        <kbd>Ctrl F</kbd>
      </div>
      <div class="titlebar-controls">
        <button id="win-min" title="Minimize"><svg viewBox="0 0 12 12" width="12" height="12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.2"/></svg></button>
        <button id="win-max" title="Maximize"><svg viewBox="0 0 12 12" width="12" height="12"><rect x="2.5" y="2.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
        <button id="win-close" title="Close"><svg viewBox="0 0 12 12" width="12" height="12"><line x1="2.5" y1="2.5" x2="9.5" y2="9.5" stroke="currentColor" stroke-width="1.2"/><line x1="9.5" y1="2.5" x2="2.5" y2="9.5" stroke="currentColor" stroke-width="1.2"/></svg></button>
      </div>
    </header>

    <!-- ══════════ Body ══════════ -->
    <div id="body">

      <nav id="sidebar">
        <div class="nav-section">
          <div class="nav-label">Library</div>
          <button class="nav-item active" data-view="albums">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="2.6" fill="currentColor"/></svg>
            Albums
          </button>
          <button class="nav-item" data-view="artists">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8.2" r="3.6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4.5 20c1.2-4 4-6 7.5-6s6.3 2 7.5 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Artists
          </button>
          <button class="nav-item" data-view="tracks">
            <svg viewBox="0 0 24 24"><path d="M9 18V5.5L20 3v12.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="6.6" cy="18.2" r="2.6" fill="currentColor"/><circle cx="17.6" cy="15.4" r="2.6" fill="currentColor"/></svg>
            Tracks
          </button>
          <button class="nav-item" data-view="genres">
            <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h10M4 17h13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Genres
          </button>
        </div>

        <div class="nav-section">
          <div class="nav-label">Collections
            <span style="display:flex;gap:2px">
              <button id="new-smart-btn" title="New smart playlist">⚡</button>
              <button id="new-playlist-btn" title="New playlist">+</button>
            </span>
          </div>
          <button class="nav-item" data-view="mostplayed">
            <svg viewBox="0 0 24 24"><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.9l-5.2 2.7 1-5.8-4.3-4.1 5.9-.9z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
            Most Played
          </button>
          <div id="playlist-nav"></div>
        </div>

        <div class="nav-spacer"></div>

        <div class="nav-section">
          <button class="nav-item" data-view="settings">
            <svg viewBox="0 0 24 24"><path d="M4 6h10M18 6h2M4 12h4M12 12h8M4 18h13M20.5 18h-1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="16" cy="6" r="2" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="10" cy="12" r="2" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="18.5" cy="18" r="2" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
            Settings &amp; DSP
          </button>
        </div>

        <div id="library-stats"></div>
      </nav>

      <main id="content"></main>

      <!-- Queue drawer -->
      <aside id="queue-panel" class="hidden">
        <div class="queue-header">
          <span>Play Queue</span>
          <button id="queue-clear">Clear</button>
        </div>
        <div id="queue-list"></div>
      </aside>
    </div>

    <!-- ══════════ Now Playing overlay ══════════ -->
    <section id="now-playing" class="hidden">
      <canvas id="np-spectrum"></canvas>
      <div class="np-backdrop" id="np-backdrop"></div>
      <button id="np-collapse" title="Collapse">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 10l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="np-content">
        <div class="np-art-wrap">
          <div class="np-art" id="np-art"></div>
          <div class="np-vinyl-glow"></div>
        </div>
        <div class="np-meta">
          <div class="np-title" id="np-title">—</div>
          <div class="np-artist" id="np-artist">—</div>
          <div class="np-album" id="np-album">—</div>
          <div class="np-quality" id="np-quality"></div>
        </div>
        <div class="np-lyrics" id="np-lyrics">
          <div class="np-lyrics-scroll" id="np-lyrics-scroll"></div>
          <div class="np-lyrics-source" id="np-lyrics-source"></div>
        </div>
      </div>
    </section>

    <!-- ══════════ Mini player ══════════ -->
    <section id="mini-player" class="hidden">
      <div id="mini-art"></div>
      <div class="mini-main">
        <div class="mini-top">
          <div class="mini-meta">
            <div id="mini-title">Nothing playing</div>
            <div id="mini-artist">—</div>
          </div>
          <div class="mini-window-controls">
            <button id="mini-restore" title="Restore full window">
              <svg viewBox="0 0 24 24" width="13" height="13"><path d="M9 3H3v6M3 3l7 7M15 21h6v-6M21 21l-7-7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="mini-close" title="Close">
              <svg viewBox="0 0 24 24" width="13" height="13"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
        <div class="mini-controls">
          <button class="pb-icon-btn" id="mini-prev" title="Previous">
            <svg viewBox="0 0 24 24"><path d="M7 5v14M18 5l-9 7 9 7z" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          </button>
          <button id="mini-play" title="Play / Pause">
            <svg id="mini-icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
            <svg id="mini-icon-pause" viewBox="0 0 24 24" class="hidden"><rect x="6.5" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="13.5" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg>
          </button>
          <button class="pb-icon-btn" id="mini-next" title="Next">
            <svg viewBox="0 0 24 24"><path d="M17 5v14M6 5l9 7-9 7z" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          </button>
          <span id="mini-time">0:00</span>
          <div id="mini-seek"><div id="mini-seek-fill"></div></div>
          <span id="mini-dur">0:00</span>
        </div>
      </div>
    </section>

    <!-- ══════════ Player bar ══════════ -->
    <footer id="player-bar">
      <div class="pb-left">
        <div id="pb-art" title="Now playing view"></div>
        <div class="pb-track-info">
          <div id="pb-title">Nothing playing</div>
          <div id="pb-artist">Add a music folder to begin</div>
        </div>
        <button class="pb-icon-btn" id="pb-favorite" title="Now playing view">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
        </button>
      </div>

      <div class="pb-center">
        <div class="pb-buttons">
          <button class="pb-icon-btn" id="btn-shuffle" title="Shuffle">
            <svg viewBox="0 0 24 24"><path d="M4 7h3.5c2 0 3 1 4.5 3m0 4c1.5 2 2.5 3 4.5 3H19m0 0-2-2m2 2-2 2M4 17h3.5c2 0 3-1 4.5-3m4.5-7H19m0 0-2-2m2 2-2 2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="pb-icon-btn" id="btn-prev" title="Previous">
            <svg viewBox="0 0 24 24"><path d="M7 5v14M18 5l-9 7 9 7z" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          </button>
          <button id="btn-play" title="Play / Pause">
            <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" class="hidden"><rect x="6.5" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="13.5" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg>
          </button>
          <button class="pb-icon-btn" id="btn-next" title="Next">
            <svg viewBox="0 0 24 24"><path d="M17 5v14M6 5l9 7-9 7z" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          </button>
          <button class="pb-icon-btn" id="btn-repeat" title="Repeat">
            <svg viewBox="0 0 24 24"><path d="M17 3l3 3-3 3M20 6H7a4 4 0 0 0-4 4v1M7 21l-3-3 3-3M4 18h13a4 4 0 0 0 4-4v-1" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span id="repeat-one" class="hidden">1</span>
          </button>
        </div>
        <div class="pb-seek">
          <span id="time-elapsed">0:00</span>
          <div id="seek-bar"><div id="seek-buffer"></div><div id="seek-fill"></div><div id="seek-thumb"></div></div>
          <span id="time-total">0:00</span>
        </div>
      </div>

      <div class="pb-right">
        <div id="pb-quality" title="Stream quality"></div>
        <canvas id="vu-meter" width="46" height="30" title="Program level"></canvas>
        <button class="pb-icon-btn" id="btn-eq" title="Equalizer">
          <svg viewBox="0 0 24 24"><path d="M6 20V10M6 6V4M12 20v-4M12 12V4M18 20v-7M18 9V4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="6" cy="8" r="1.9" fill="currentColor"/><circle cx="12" cy="14" r="1.9" fill="currentColor"/><circle cx="18" cy="11" r="1.9" fill="currentColor"/></svg>
        </button>
        <button class="pb-icon-btn" id="btn-queue" title="Queue">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 11h16M4 16h9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M17 15v6l4-3z" fill="currentColor"/></svg>
        </button>
        <button class="pb-icon-btn" id="btn-mini" title="Mini player">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.7"/><rect x="12" y="11" width="7" height="5" rx="1" fill="currentColor"/></svg>
        </button>
        <div class="pb-volume">
          <svg viewBox="0 0 24 24" width="16" height="16" id="vol-icon"><path d="M4 9v6h4l5 4V5L8 9z" fill="currentColor"/><path id="vol-wave" d="M16.5 8.5a5 5 0 0 1 0 7M19 6a8.5 8.5 0 0 1 0 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <input type="range" id="volume-slider" min="0" max="100" value="80" />
        </div>
      </div>
    </footer>

    <!-- Signal path popover -->
    <div id="signal-path" class="hidden"></div>
    <!-- Context menu -->
    <div id="context-menu" class="hidden"></div>
    <!-- Toasts -->
    <div id="toasts"></div>
    <!-- Modal root -->
    <div id="modal-root" class="hidden"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
