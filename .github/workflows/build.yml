name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # WASAPI exclusive-mode addon (N-API → ABI-stable across Electron)
      - name: Build WASAPI exclusive addon
        working-directory: native-addons/wasapi-exclusive
        run: |
          npm install
          npx node-gyp rebuild

      - name: Build NSIS installer
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Tag builds publish a GitHub Release including latest.yml + blockmap,
      # which the in-app auto-updater (electron-updater) reads.
      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --win nsis --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Auralis-Setup
          path: release/Auralis-Setup-*.exe
